<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script type="module" src="script.js"></script>
    <title>Anime Tracker</title>
</head>
<body>
    <div id="auth-container" class="container">
        <h1>Anime Tracker</h1>
        <p>Login to sync your list across devices</p>
        <button id="login-btn">Sign in with Google</button>
    </div>

    <div id="app-container" class="container" style="display:none;">
        <header class="main-header">
            <div id="user-display">Welcome, <span id="username-text">User</span></div>
            <button id="logout-btn">Logout</button>
        </header>

        <button id="btn-random-main" class="btn-random" onclick="pickRandom()">🎲 PICK RANDOM ANIME</button>
        
        <div class="input-group">
            <input type="text" id="searchInput" placeholder="Search or add anime..." onkeyup="handleSearch()">
            <button id="btn-add-main" class="btn-add" onclick="addAnime()">+ Add</button>
        </div>

        <div id="import-export-section" class="import-export-section">
            <div class="btn-row">
                <button class="btn-secondary" onclick="document.getElementById('fileInput').click()">📁 Import</button>
                <button class="btn-secondary" onclick="exportFile()">💾 Export</button>
            </div>
            <input type="file" id="fileInput" style="display:none" accept=".txt,.csv" onchange="importFile(event)">
        </div>

        <div class="tabs">
            <div id="tabToWatch" class="tab active" onclick="switchTab('toWatch')">To Watch (<span id="countTW">0</span>)</div>
            <div id="tabWatched" class="tab" onclick="switchTab('watched')">Watched (<span id="countW">0</span>)</div>
            <div id="tabLibrary" class="tab" onclick="switchTab('library')">Library</div>
        </div>

        <button id="btn-clear-main" class="btn-clear" onclick="clearCurrentList()">🗑️ Wipe Current List</button>

        <div id="listContainer"></div>
    </div>

    <div id="overlay">
        <div class="overlay-content" style="text-align: center;">
            <div style="color: #a78bfa; margin-bottom: 10px;">Your next mission:</div>
            <div id="random-result"></div>
            <button onclick="moveToWatchedFromRandom()" style="background: #22c55e;">Mark as Watched</button>
            <button onclick="closeOverlay()" style="background: #312e81; color: white;">Skip</button>
        </div>
    </div>

    <div id="options-modal" class="modal">
        <div class="modal-content">
            <h3 id="options-title" style="color: var(--text); margin-top: 0;">Anime Name</h3>
            <button onclick="editItemPrompt()" style="background: var(--accent-dark);">✏️ Szerkesztés</button>
            <button id="move-btn" onclick="moveListItem()" style="background: #0ea5e9;">🔄 Áthelyezés</button>
            <button onclick="confirmDelete()" style="background: var(--danger);">🗑️ Törlés</button>
            <button onclick="closeOptions()" style="background: transparent; border: 1px solid #475569; margin-top: 15px;">Mégse</button>
        </div>
    </div>

    <div id="add-node-modal" class="modal">
        <div class="modal-content">
            <h3 style="color: var(--accent); margin-top: 0;">Új elem hozzáadása</h3>
            <p id="add-node-subtitle" style="color: var(--text-muted); font-size: 14px; margin-bottom: 15px;">Ide: Gyökérkönyvtár</p>
            
            <select id="node-type-select" style="width: 100%; padding: 10px; margin-bottom: 10px; background: rgba(255, 255, 255, 0.05); color: white; border: 1px solid var(--accent); border-radius: 8px;">
                <option value="Anime">Anime (Fő)</option>
                <option value="Manga">Manga (Fő)</option>
                <option value="Season">Season</option>
                <option value="Arc">Arc</option>
                <option value="Cour">Cour</option>
                <option value="Episode">Episode</option>
                <option value="Movie">Movie</option>
                <option value="OVA">OVA</option>
            </select>
            
            <input type="text" id="node-name-input" placeholder="Elem neve (pl. Season 1, Naruto...)" style="margin-bottom: 15px;">
            
            <button onclick="confirmAddNode()" style="background: var(--success);">✔️ Hozzáadás</button>
            <button onclick="closeAddNodeModal()" style="background: transparent; border: 1px solid #475569; margin-top: 5px;">Mégse</button>
        </div>
    </div>
</body>
</html>
